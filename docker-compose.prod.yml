services:
  db:
    image: mysql:latest
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-gestion_bibliotheque}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$DB_USER -p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build:
      context: .
    container_name: storeshop
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: gestion_bibliotheque
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_UPLOAD_DIR: /var/lib/storeshop/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storeshop-uploads:/var/lib/storeshop/uploads

volumes:
  mysql-data:
  storeshop-uploads:
    name: storeshop-uploads
