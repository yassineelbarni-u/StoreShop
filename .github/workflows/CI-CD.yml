name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 31.97.55.52
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/StoreShop
            git pull
            docker compose -f docker-compose.prod.yml up -d --build